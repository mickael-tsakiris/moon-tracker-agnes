<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f1528"/>
      <stop offset="100%" stop-color="#070b14"/>
    </radialGradient>
    <radialGradient id="moonFace" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#fffef8"/>
      <stop offset="35%" stop-color="#f5f0e0"/>
      <stop offset="70%" stop-color="#e8dcc8"/>
      <stop offset="100%" stop-color="#d4c8aa"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fffef0" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#e8dcc0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e8dcc0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crater1" cx="45%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#c8b890" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#d4c8aa" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crater2" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#bfb088" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4c8aa" stop-opacity="0"/>
    </radialGradient>
    <filter id="moonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="moonClip">
      <circle cx="256" cy="256" r="150"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Outer glow -->
  <circle cx="256" cy="256" r="200" fill="url(#glow)"/>
  <!-- Moon body -->
  <g filter="url(#moonGlow)">
    <circle cx="256" cy="256" r="150" fill="url(#moonFace)"/>
  </g>
  <!-- Subtle craters / maria -->
  <g clip-path="url(#moonClip)" opacity="0.6">
    <ellipse cx="220" cy="210" rx="45" ry="40" fill="url(#crater1)"/>
    <ellipse cx="300" cy="280" rx="35" ry="30" fill="url(#crater2)"/>
    <ellipse cx="195" cy="300" rx="28" ry="25" fill="url(#crater1)"/>
    <ellipse cx="280" cy="190" rx="20" ry="18" fill="url(#crater2)"/>
    <ellipse cx="240" cy="260" rx="55" ry="45" fill="url(#crater1)" opacity="0.4"/>
  </g>
</svg>
